<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MegaStore | Factura Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --accent: #10b981;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            margin: 0;
            padding-bottom: 120px;
        }

        /* HEADER */
        .navbar {
            position: sticky; top: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(15px);
            padding: 15px 20px;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .container { padding: 20px; max-width: 1000px; margin: auto; }

        /* GRID PRODUCTOS */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }

        .card-img { font-size: 3rem; margin-bottom: 10px; }
        .price { color: var(--accent); font-weight: 800; font-size: 1.1rem; }

        /* CONTROLES */
        .qty-wrapper {
            display: flex; align-items: center; justify-content: center;
            gap: 15px; background: rgba(0,0,0,0.2);
            border-radius: 10px; margin: 10px 0; padding: 5px;
        }
        .btn-qty { background: none; border: none; color: white; cursor: pointer; font-size: 1.2rem; }
        .btn-add {
            background: var(--primary); color: white; border: none;
            padding: 10px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer;
        }

        /* MODAL DE FACTURA (EL RECIBO) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: center; z-index: 3000;
        }

        .factura-card {
            background: white; color: #333; width: 90%; max-width: 400px;
            border-radius: 20px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        .factura-header { text-align: center; border-bottom: 2px dashed #ccc; padding-bottom: 15px; margin-bottom: 15px; }
        .factura-header h2 { margin: 0; color: var(--dark-bg); }

        .factura-items { max-height: 250px; overflow-y: auto; margin-bottom: 15px; }
        .factura-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 0.9rem; }

        .factura-total { font-size: 1.4rem; font-weight: 800; text-align: right; margin-top: 15px; color: #000; }

        .btn-confirm {
            background: var(--accent); color: white; border: none; width: 100%;
            padding: 15px; border-radius: 12px; font-weight: 800; font-size: 1rem;
            cursor: pointer; margin-top: 15px; display: flex; justify-content: center; gap: 10px;
        }

        .btn-close { position: absolute; top: 15px; right: 15px; background: #eee; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; }

        /* FOOTER CART */
        .footer-cart {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 500px; background: var(--card-bg);
            padding: 15px 25px; border-radius: 50px; display: flex;
            justify-content: space-between; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<nav class="navbar">
    <h1 style="margin:0; font-size: 1.5rem;">⚡ MEGASTORE PRO</h1>
</nav>

<div class="container">
    <div class="grid" id="productGrid"></div>
</div>

<div class="modal-overlay" id="modalFactura">
    <div class="factura-card">
        <button class="btn-close" onclick="cerrarFactura()">×</button>
        <div class="factura-header">
            <h2>RECIBO DE VENTA</h2>
            <p id="fechaFactura" style="font-size: 0.8rem; color: #666;"></p>
        </div>
        
        <div id="listaFactura" class="factura-items">
            </div>

        <div class="factura-total">
            TOTAL: $<span id="totalFactura">0</span>
        </div>

        <button class="btn-confirm" onclick="confirmarWhatsApp()">
            CONFIRMAR Y ENVIAR <i class="fab fa-whatsapp"></i>
        </button>
    </div>
</div>

<div class="footer-cart">
    <div>
        <span style="font-size: 0.8rem; color: var(--text-dim);">LLEVAS:</span><br>
        <span style="font-weight: 800; font-size: 1.2rem;">$<span id="totalFooter">0</span></span>
    </div>
    <button class="btn-add" style="width: auto; padding: 10px 25px; background: var(--accent);" onclick="abrirFactura()">
        VER FACTURA
    </button>
</div>

<script>
    const products = [
        { id: 1, name: 'AirPods Max', price: 1200000, icon: '🎧' },
        { id: 2, name: 'iPhone 15 Pro', price: 4500000, icon: '📱' },
        { id: 3, name: 'Smartwatch V8', price: 250000, icon: '⌚' },
        { id: 4, name: 'Cámara Pro', price: 1800000, icon: '📷' },
        { id: 5, name: 'Mouse Gamer', price: 150000, icon: '🖱️' },
        { id: 6, name: 'Teclado Mecánico', price: 300000, icon: '⌨️' }
    ];

    let cart = [];
    let total = 0;

    function render() {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = products.map(p => `
            <div class="card">
                <div class="card-img">${p.icon}</div>
                <h3>${p.name}</h3>
                <p class="price">$${p.price.toLocaleString()}</p>
                <div class="qty-wrapper">
                    <button class="btn-qty" onclick="changeQty(${p.id}, -1)">-</button>
                    <span id="q-${p.id}" style="font-weight:bold">1</span>
                    <button class="btn-qty" onclick="changeQty(${p.id}, 1)">+</button>
                </div>
                <button class="btn-add" onclick="addToCart(${p.id})">Añadir</button>
            </div>
        `).join('');
    }

    function changeQty(id, delta) {
        const el = document.getElementById(`q-${id}`);
        let val = parseInt(el.innerText) + delta;
        if(val >= 1) el.innerText = val;
    }

    function addToCart(id) {
        const p = products.find(prod => prod.id === id);
        const qty = parseInt(document.getElementById(`q-${id}`).innerText);
        const sub = p.price * qty;

        const exist = cart.find(i => i.id === id);
        if(exist) {
            exist.qty += qty;
            exist.sub += sub;
        } else {
            cart.push({ ...p, qty, sub });
        }
        total += sub;
        document.getElementById('totalFooter').innerText = total.toLocaleString();
        document.getElementById(`q-${id}`).innerText = "1";
    }

    function abrirFactura() {
        if(cart.length === 0) return alert("Carrito vacío");
        
        const lista = document.getElementById('listaFactura');
        lista.innerHTML = cart.map(i => `
            <div class="factura-item">
                <span><strong>${i.qty}x</strong> ${i.name}</span>
                <span>$${i.sub.toLocaleString()}</span>
            </div>
        `).join('');

        document.getElementById('totalFactura').innerText = total.toLocaleString();
        document.getElementById('fechaFactura').innerText = "Emitida el: " + new Date().toLocaleString();
        document.getElementById('modalFactura').style.display = 'flex';
    }

    function cerrarFactura() {
        document.getElementById('modalFactura').style.display = 'none';
    }

    function confirmarWhatsApp() {
        let n = Math.floor(Math.random() * 1000);
        let msg = `🧾 *RECIBO DE VENTA #00${n}*%0A%0A`;
        cart.forEach(i => {
            msg += `• ${i.qty} x ${i.name} = *$${i.sub.toLocaleString()}*%0A`;
        });
        msg += `%0A💰 *TOTAL: $${total.toLocaleString()}*%0A`;
        
        window.open(`https://wa.me/573007918978?text=${msg}`, '_blank');
    }

    render();
</script>
</body>
</html>
