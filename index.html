<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MegaStore Elite | Factura Garantizada</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #6366f1; --accent: #10b981; --dark-bg: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--dark-bg); color: var(--text-main); margin: 0; padding-bottom: 120px; }
        
        .navbar { position: sticky; top: 0; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); padding: 15px; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .search-container { padding: 15px; max-width: 600px; margin: auto; }
        #searchBar { width: 100%; padding: 12px; border-radius: 12px; border: none; background: var(--card-bg); color: white; outline: none; border: 1px solid transparent; transition: 0.3s; }
        #searchBar:focus { border-color: var(--primary); }

        .container { padding: 20px; max-width: 1200px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }

        .card { background: var(--card-bg); border-radius: 20px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); text-align: center; display: flex; flex-direction: column; justify-content: space-between; transition: 0.3s; }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .card-img { font-size: 3rem; margin-bottom: 10px; background: rgba(255,255,255,0.03); border-radius: 15px; padding: 10px; }
        .price { color: var(--accent); font-weight: 800; font-size: 1.1rem; margin: 5px 0; }

        .qty-wrapper { display: flex; align-items: center; justify-content: center; gap: 10px; background: rgba(0,0,0,0.3); border-radius: 12px; margin-bottom: 8px; padding: 5px; }
        .btn-qty { background: none; border: none; color: white; cursor: pointer; font-size: 1.2rem; width: 30px; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }

        /* MODAL FACTURA */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 3000; }
        .factura-card { background: white; color: #1e293b; width: 90%; max-width: 400px; border-radius: 24px; padding: 30px; position: relative; }
        .factura-header { text-align: center; border-bottom: 2px dashed #cbd5e1; padding-bottom: 15px; margin-bottom: 15px; }
        .factura-items { max-height: 200px; overflow-y: auto; margin-bottom: 15px; }
        .factura-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        .factura-total { font-size: 1.5rem; font-weight: 900; text-align: right; color: #0f172a; }
        
        .btn-confirm { background: var(--accent); color: white; border: none; width: 100%; padding: 15px; border-radius: 15px; font-weight: 800; cursor: pointer; margin-top: 15px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-close { position: absolute; top: 15px; right: 15px; background: #f1f5f9; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; }

        /* FOOTER CARRITO */
        .footer-cart { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 550px; background: rgba(30, 41, 59, 0.95); padding: 15px 25px; border-radius: 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 15px 35px rgba(0,0,0,0.4); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<nav class="navbar">
    <h1 style="margin:0;">MEGASTORE <span style="color:var(--primary)">ELITE</span></h1>
</nav>

<div class="search-container">
    <input type="text" id="searchBar" placeholder="Buscar productos..." onkeyup="search()">
</div>

<div class="container">
    <div class="grid" id="productGrid"></div>
</div>

<div class="modal-overlay" id="modalFactura">
    <div class="factura-card">
        <button class="btn-close" onclick="cerrarFactura()">✕</button>
        <div class="factura-header">
            <h2 style="margin:0">TU RECIBO</h2>
            <p id="fechaFactura" style="font-size: 0.8rem; color: #64748b; margin: 5px 0 0 0;"></p>
        </div>
        <div id="listaFactura" class="factura-items"></div>
        <div class="factura-total">TOTAL: $<span id="totalFactura">0</span></div>
        <button class="btn-confirm" onclick="confirmarWhatsApp()">
            ENVIAR PEDIDO <i class="fab fa-whatsapp"></i>
        </button>
    </div>
</div>

<div class="footer-cart">
    <div>
        <span style="font-size: 0.7rem; color: var(--text-dim);">LLEVAS:</span><br>
        <span style="font-weight: 800; font-size: 1.4rem; color: var(--accent);">$<span id="totalFooter">0</span></span>
    </div>
    <button class="btn-add" style="width: auto; padding: 12px 25px;" onclick="abrirFactura()">
        FINALIZAR COMPRA
    </button>
</div>

<script>
    const products = [
        { id: 1, name: 'AirPods Max', price: 1250000, icon: '🎧' },
        { id: 2, name: 'iPhone 15 Pro', price: 4800000, icon: '📱' },
        { id: 3, name: 'Smartwatch Series 9', price: 950000, icon: '⌚' },
        { id: 4, name: 'Cámara Mirrorless', price: 2100000, icon: '📷' },
        { id: 5, name: 'Laptop Pro 14"', price: 5500000, icon: '💻' },
        { id: 6, name: 'Consola PS5', price: 2400000, icon: '🎮' },
        { id: 7, name: 'Mouse Gamer RGB', price: 180000, icon: '🖱️' },
        { id: 8, name: 'Teclado Mecánico', price: 320000, icon: '⌨️' },
        { id: 9, name: 'Monitor 4K', price: 1600000, icon: '🖥️' },
        { id: 10, name: 'Cafetera Espresso', price: 450000, icon: '☕' },
        { id: 11, name: 'Freidora de Aire', price: 380000, icon: '🍗' },
        { id: 12, name: 'Aspiradora Robot', price: 890000, icon: '🧹' },
        { id: 13, name: 'Lámpara Smart', price: 120000, icon: '💡' },
        { id: 14, name: 'Zapatillas Running', price: 350000, icon: '👟' },
        { id: 15, name: 'Pesas 20kg', price: 220000, icon: '🏋️' },
        { id: 16, name: 'Smart Band', price: 150000, icon: '🏃' },
        { id: 17, name: 'Mochila Tech', price: 110000, icon: '🎒' },
        { id: 18, name: 'Parlante BT', price: 580000, icon: '🔊' },
        { id: 19, name: 'Tableta Gráfica', price: 420000, icon: '✍️' },
        { id: 20, name: 'Gafas VR', price: 1100000, icon: '🕶️' }
    ];

    let cart = [];
    let total = 0;

    function render() {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = products.map(p => `
            <div class="card" data-name="${p.name.toLowerCase()}">
                <div class="card-img">${p.icon}</div>
                <h3 style="font-size: 0.85rem">${p.name}</h3>
                <p class="price">$${p.price.toLocaleString()}</p>
                <div class="qty-wrapper">
                    <button class="btn-qty" onclick="changeQty(${p.id}, -1)">-</button>
                    <span id="q-${p.id}" style="font-weight:bold">1</span>
                    <button class="btn-qty" onclick="changeQty(${p.id}, 1)">+</button>
                </div>
                <button class="btn-add" onclick="addToCart(${p.id})">Agregar</button>
            </div>
        `).join('');
    }

    function changeQty(id, delta) {
        const el = document.getElementById(`q-${id}`);
        let val = parseInt(el.innerText) + delta;
        if(val >= 1) el.innerText = val;
    }

    function addToCart(id) {
        const p = products.find(prod => prod.id === id);
        const qty = parseInt(document.getElementById(`q-${id}`).innerText);
        const sub = p.price * qty;

        const exist = cart.find(i => i.id === id);
        if(exist) { exist.qty += qty; exist.sub += sub; }
        else { cart.push({ ...p, qty, sub }); }
        
        total += sub;
        document.getElementById('totalFooter').innerText = total.toLocaleString();
        document.getElementById(`q-${id}`).innerText = "1";
    }

    function search() {
        const term = document.getElementById('searchBar').value.toLowerCase();
        document.querySelectorAll('.card').forEach(card => {
            card.style.display = card.dataset.name.includes(term) ? 'flex' : 'none';
        });
    }

    function abrirFactura() {
        if(cart.length === 0) return alert("¡Carrito vacío!");
        const lista = document.getElementById('listaFactura');
        lista.innerHTML = cart.map(i => `<div class="factura-item"><span><strong>${i.qty}x</strong> ${i.name}</span><span>$${i.sub.toLocaleString()}</span></div>`).join('');
        document.getElementById('totalFactura').innerText = total.toLocaleString();
        document.getElementById('fechaFactura').innerText = new Date().toLocaleString();
        document.getElementById('modalFactura').style.display = 'flex';
    }

    function cerrarFactura() { document.getElementById('modalFactura').style.display = 'none'; }

    // --- EL CEREBRO DE LA OPERACIÓN ---
    function confirmarWhatsApp() {
        // 1. Crear el cuerpo del mensaje
        let textoFactura = `🧾 *ORDEN DE COMPRA*\n`;
        textoFactura += `📅 Fecha: ${new Date().toLocaleDateString()}\n`;
        textoFactura += `--------------------------\n`;
        
        // 2. RECORRER EL CARRITO PARA LA LISTA DETALLADA
        cart.forEach(item => {
            textoFactura += `• ${item.qty} x ${item.name} = $${item.sub.toLocaleString()}\n`;
        });

        textoFactura += `--------------------------\n`;
        textoFactura += `💰 *TOTAL A PAGAR: $${total.toLocaleString()}*\n`;
        textoFactura += `--------------------------\n`;
        textoFactura += `_Enviado desde MegaStore Elite_`;

        // 3. ENCODER: Esta es la clave para que WhatsApp no falle
        const mensajeFinal = encodeURIComponent(textoFactura);
        const numeroTel = "573007918978"; 
        
        // 4. ABRIR LINK
        window.open(`https://wa.me/${numeroTel}?text=${mensajeFinal}`, '_blank');
    }

    render();
</script>
</body>
</html>
