<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Pro | Selección Express</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --green: #25d366; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --blue: #3b82f6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; }
        
        header { text-align: center; margin-bottom: 30px; }
        h1 { margin: 0; color: var(--blue); }

        /* ESTILO DE LA BARRITA DE PRODUCTO */
        .producto-row {
            background: var(--card);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #334155;
        }

        .info-prod h3 { margin: 0; font-size: 1.1rem; }
        .info-prod span { color: var(--green); font-weight: bold; }

        /* CONTROLES DE CANTIDAD (- 1 +) */
        .controles {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #0f172a;
            padding: 5px 10px;
            border-radius: 8px;
        }

        .btn-qty {
            background: var(--blue);
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .btn-qty:hover { transform: scale(1.1); background: #2563eb; }
        .qty-val { font-weight: bold; font-size: 1.1rem; min-width: 20px; text-align: center; }

        .btn-add-main {
            background: var(--green);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-left: 10px;
        }

        /* CARRITO Y FACTURA */
        .carrito-container {
            background: white;
            color: #1e293b;
            border-radius: 15px;
            padding: 20px;
            margin-top: 30px;
        }

        .item-carrito {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #e2e8f0;
            padding: 8px 0;
        }

        .total-box {
            text-align: right;
            font-size: 1.5rem;
            font-weight: 800;
            margin-top: 15px;
        }

        .btn-factura {
            background: #0f172a;
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        .btn-whatsapp {
            display: none;
            background: var(--green);
            color: white;
            text-decoration: none;
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🛍️ Store Express</h1>
        <p>Ajusta cantidades y pide por WA</p>
    </header>

    <div class="producto-row">
        <div class="info-prod">
            <h3>Producto Alfa</h3>
            <span>$30.000</span>
        </div>
        <div style="display:flex; align-items:center;">
            <div class="controles">
                <button class="btn-qty" onclick="cambiarQty('qty1', -1)">-</button>
                <span class="qty-val" id="qty1">1</span>
                <button class="btn-qty" onclick="cambiarQty('qty1', 1)">+</button>
            </div>
            <button class="btn-add-main" onclick="agregar('Producto Alfa', 30000, 'qty1')">OK</button>
        </div>
    </div>

    <div class="producto-row">
        <div class="info-prod">
            <h3>Combo Premium</h3>
            <span>$90.000</span>
        </div>
        <div style="display:flex; align-items:center;">
            <div class="controles">
                <button class="btn-qty" onclick="cambiarQty('qty2', -1)">-</button>
                <span class="qty-val" id="qty2">1</span>
                <button class="btn-qty" onclick="cambiarQty('qty2', 1)">+</button>
            </div>
            <button class="btn-add-main" onclick="agregar('Combo Premium', 90000, 'qty2')">OK</button>
        </div>
    </div>

    <div class="carrito-container">
        <h3>📄 Factura Resumen</h3>
        <div id="lista-items"><p style="color:#64748b">Carrito vacío</p></div>
        <div class="total-box">Total: $<span id="suma-total">0</span></div>
        
        <button class="btn-factura" id="btn-f" onclick="finalizar()">GENERAR FACTURA N° <span id="f-next">1</span></button>
        
        <a id="btn-ws" class="btn-whatsapp" target="_blank">
            <i class="fab fa-whatsapp"></i> ENVIAR A WHATSAPP
        </a>
    </div>
</div>

<script>
    let carrito = [];
    let total = 0;

    // Inicializar contador de factura
    if(!localStorage.getItem('factNum')) localStorage.setItem('factNum', 1);
    document.getElementById('f-next').innerText = localStorage.getItem('factNum');

    function cambiarQty(id, val) {
        let el = document.getElementById(id);
        let current = parseInt(el.innerText);
        if(current + val >= 1) el.innerText = current + val;
    }

    function agregar(nombre, precio, idQty) {
        let cant = parseInt(document.getElementById(idQty).innerText);
        let sub = precio * cant;
        
        carrito.push({ nombre, cant, sub });
        total += sub;
        
        render();
        document.getElementById(idQty).innerText = "1"; // Reset
    }

    function render() {
        const cont = document.getElementById('lista-items');
        cont.innerHTML = '';
        carrito.forEach(i => {
            cont.innerHTML += `<div class="item-carrito"><span>${i.cant}x ${i.nombre}</span><span>$${i.sub.toLocaleString()}</span></div>`;
        });
        document.getElementById('suma-total').innerText = total.toLocaleString();
    }

    function finalizar() {
        if(carrito.length === 0) return alert("Agregue algo, bro");

        let n = localStorage.getItem('factNum');
        const tel = "573007918978";
        
        let msg = `*FACTURA N° ${n}*%0A--------------------------%0A`;
        carrito.forEach(i => {
            msg += `✅ ${i.cant}x ${i.nombre} - $${i.sub.toLocaleString()}%0A`;
        });
        msg += `--------------------------%0A*TOTAL: $${total.toLocaleString()}*%0A%0A_Envío comprobante de pago._`;

        document.getElementById('btn-ws').href = `https://wa.me/${tel}?text=${msg}`;
        document.getElementById('btn-ws').style.display = 'block';
        document.getElementById('btn-f').disabled = true;
        document.getElementById('btn-f').innerText = "FACTURA GENERADA ✅";

        // Subir contador para la próxima
        localStorage.setItem('factNum', parseInt(n) + 1);
    }
</script>

</body>
</html>
