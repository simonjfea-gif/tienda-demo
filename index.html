<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado Local | Demo Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #fbbf24; --secondary: #10b981; --dark: #0f172a; --light: #f8fafc; }
        body { font-family: 'Poppins', sans-serif; background: #f1f5f9; color: var(--dark); margin: 0; padding: 20px; padding-bottom: 100px; }
        
        .header { text-align: center; padding: 20px 0; background: var(--dark); color: white; margin: -20px -20px 20px -20px; border-radius: 0 0 20px 20px; }
        
        /* BUSCADOR Y FILTROS */
        .search-box { width: 100%; max-width: 500px; margin: 0 auto 20px; position: relative; }
        .search-box input { width: 100%; padding: 12px 40px 12px 15px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 1rem; }
        
        .categories { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; margin-bottom: 20px; scrollbar-width: none; }
        .cat-btn { background: white; border: 1px solid #ddd; padding: 8px 15px; border-radius: 20px; white-space: nowrap; cursor: pointer; font-weight: 600; }
        .cat-btn.active { background: var(--primary); border-color: var(--primary); }

        /* PRODUCTOS */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .card { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; text-align: center; transition: 0.3s; }
        .card img { width: 80px; height: 80px; object-fit: cover; border-radius: 10px; margin-bottom: 10px; background: #f8fafc; }
        .card h3 { margin: 5px 0; font-size: 0.9rem; height: 40px; overflow: hidden; }
        .card .price { color: var(--secondary); font-weight: 800; font-size: 1.1rem; }

        /* CONTROLES CANTIDAD */
        .controls { display: flex; align-items: center; gap: 10px; margin: 10px 0; background: #f1f5f9; padding: 5px 10px; border-radius: 8px; }
        .btn-q { border: none; background: none; font-size: 1.2rem; cursor: pointer; font-weight: bold; color: var(--dark); }
        .btn-add { background: var(--dark); color: white; border: none; padding: 8px 15px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: 600; }

        /* NOTIFICACIÓN */
        #toast { position: fixed; top: 20px; right: 20px; background: var(--secondary); color: white; padding: 10px 20px; border-radius: 8px; display: none; z-index: 1000; animation: slideIn 0.5s; }

        /* CARRITO FLOTANTE */
        .cart-summary { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 500px; background: var(--dark); color: white; padding: 15px 25px; border-radius: 50px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 999; }
        .btn-checkout { background: var(--primary); color: var(--dark); border: none; padding: 10px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; }

        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @media (max-width: 400px) { .grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

<div id="toast">¡Producto agregado! 🛒</div>

<div class="header">
    <h1 style="margin:0">MERCADO MÓVIL</h1>
    <p style="margin:0; opacity:0.8">Demo para Mercado Local</p>
</div>

<div class="search-box">
    <input type="text" id="search" placeholder="¿Qué buscas hoy?" onkeyup="filtrarBusqueda()">
</div>

<div class="categories">
    <button class="cat-btn active" onclick="filtrarCat('Todos', this)">Todos</button>
    <button class="cat-btn" onclick="filtrarCat('Fruver', this)">Fruver 🍎</button>
    <button class="cat-btn" onclick="filtrarCat('Abarrotes', this)">Abarrotes 🍝</button>
    <button class="cat-btn" onclick="filtrarCat('Aseo', this)">Aseo 🧼</button>
</div>

<div class="grid" id="productos-grid">
    </div>

<div class="cart-summary">
    <div>
        <span id="cart-count">0</span> Items | 
        <span style="font-weight:bold; color:var(--primary)">$<span id="cart-total">0</span></span>
    </div>
    <button class="btn-checkout" onclick="irAPagar()">PEDIR POR WHATSAPP</button>
</div>

<script>
    const productos = [
        { id: 1, nombre: 'Manzana Roja (lb)', precio: 4500, cat: 'Fruver', img: '🍎' },
        { id: 2, nombre: 'Arroz Diana (1kg)', precio: 3800, cat: 'Abarrotes', img: '🍚' },
        { id: 3, nombre: 'Jabón Rey', precio: 2500, cat: 'Aseo', img: '🧼' },
        { id: 4, nombre: 'Papa Sabanera (lb)', precio: 2200, cat: 'Fruver', img: '🥔' },
        { id: 5, nombre: 'Aceite Girasol', precio: 12000, cat: 'Abarrotes', img: '🌻' },
        { id: 6, nombre: 'Detergente Ariel', precio: 8500, cat: 'Aseo', img: '✨' }
    ];

    let carrito = [];
    let total = 0;

    function renderProductos(lista) {
        const grid = document.getElementById('productos-grid');
        grid.innerHTML = '';
        lista.forEach(p => {
            grid.innerHTML += `
                <div class="card" data-nombre="${p.nombre}" data-cat="${p.cat}">
                    <div style="font-size: 3rem">${p.img}</div>
                    <h3>${p.nombre}</h3>
                    <span class="price">$${p.precio.toLocaleString()}</span>
                    <div class="controls">
                        <button class="btn-q" onclick="changeQty(${p.id}, -1)">-</button>
                        <span id="qty-${p.id}" style="font-weight:bold">1</span>
                        <button class="btn-q" onclick="changeQty(${p.id}, 1)">+</button>
                    </div>
                    <button class="btn-add" onclick="addToCart(${p.id})">Agregar</button>
                </div>
            `;
        });
    }

    function changeQty(id, delta) {
        let el = document.getElementById(`qty-${id}`);
        let val = parseInt(el.innerText) + delta;
        if(val >= 1) el.innerText = val;
    }

    function addToCart(id) {
        const prod = productos.find(p => p.id === id);
        const cant = parseInt(document.getElementById(`qty-${id}`).innerText);
        
        carrito.push({ nombre: prod.nombre, cant: cant, sub: prod.precio * cant });
        total += prod.precio * cant;
        
        updateSummary();
        showToast();
    }

    function updateSummary() {
        document.getElementById('cart-count').innerText = carrito.length;
        document.getElementById('cart-total').innerText = total.toLocaleString();
    }

    function showToast() {
        const t = document.getElementById('toast');
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }

    function filtrarBusqueda() {
        const text = document.getElementById('search').value.toLowerCase();
        const filtrados = productos.filter(p => p.nombre.toLowerCase().includes(text));
        renderProductos(filtrados);
    }

    function filtrarCat(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if(cat === 'Todos') renderProductos(productos);
        else renderProductos(productos.filter(p => p.cat === cat));
    }

    function irAPagar() {
        if(carrito.length === 0) return alert("El carrito está vacío");
        
        if(!localStorage.getItem('factNum')) localStorage.setItem('factNum', 1);
        let n = localStorage.getItem('factNum');
        
        let msg = `*ORDEN DE MERCADO #00${n}*%0A--------------------------%0A`;
        carrito.forEach(i => msg += `• ${i.cant}x ${i.nombre} ($${i.sub.toLocaleString()})%0A`);
        msg += `--------------------------%0A*TOTAL: $${total.toLocaleString()}*%0A%0A_Por favor confirmar disponibilidad._`;
        
        localStorage.setItem('factNum', parseInt(n) + 1);
        window.open(`https://wa.me/573007918978?text=${msg}`, '_blank');
    }

    renderProductos(productos);
</script>

</body>
</html>
