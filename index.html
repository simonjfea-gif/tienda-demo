<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado Pro | Factura Dinámica</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #fbbf24; --dark: #0f172a; --secondary: #10b981; }
        body { font-family: 'Poppins', sans-serif; background: #f1f5f9; margin: 0; padding: 20px; padding-bottom: 100px; }
        .header { text-align: center; background: var(--dark); color: white; padding: 20px; margin: -20px -20px 20px -20px; border-radius: 0 0 20px 20px; }
        .producto-row { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .controls { display: flex; align-items: center; gap: 10px; background: #eee; padding: 5px 10px; border-radius: 8px; }
        .btn-q { border: none; background: none; font-size: 1.2rem; cursor: pointer; font-weight: bold; }
        .btn-add { background: var(--dark); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; margin-left: 10px; }
        .cart-float { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 500px; background: var(--dark); color: white; padding: 15px; border-radius: 50px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .btn-ws { background: var(--primary); color: var(--dark); border: none; padding: 10px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>

<div class="header">
    <h1>🛒 MI MERCADO</h1>
    <p>Añade productos y genera tu factura</p>
</div>

<div id="lista-productos">
    <div class="producto-row">
        <div><strong>Papa Sabanera (lb)</strong><br><span style="color:var(--secondary)">$2.200</span></div>
        <div style="display:flex; align-items:center;">
            <div class="controls">
                <button class="btn-q" onclick="cambiar('q1', -1)">-</button>
                <span id="q1">1</span>
                <button class="btn-q" onclick="cambiar('q1', 1)">+</button>
            </div>
            <button class="btn-add" onclick="agregar('Papa Sabanera (lb)', 2200, 'q1')">Añadir</button>
        </div>
    </div>
    <div class="producto-row">
        <div><strong>Arroz Diana (1kg)</strong><br><span style="color:var(--secondary)">$3.800</span></div>
        <div style="display:flex; align-items:center;">
            <div class="controls">
                <button class="btn-q" onclick="cambiar('q2', -1)">-</button>
                <span id="q2">1</span>
                <button class="btn-q" onclick="cambiar('q2', 1)">+</button>
            </div>
            <button class="btn-add" onclick="agregar('Arroz Diana (1kg)', 3800, 'q2')">Añadir</button>
        </div>
    </div>
</div>

<div class="cart-float">
    <div>Items: <span id="c-count">0</span> | Total: <strong>$<span id="c-total">0</span></strong></div>
    <button class="btn-ws" onclick="enviarWhatsApp()">PEDIR POR WHATSAPP</button>
</div>

<script>
    let carrito = [];
    let totalGeneral = 0;

    function cambiar(id, delta) {
        let el = document.getElementById(id);
        let val = parseInt(el.innerText) + delta;
        if(val >= 1) el.innerText = val;
    }

    function agregar(nombre, precio, idQty) {
        let cant = parseInt(document.getElementById(idQty).innerText);
        let subtotal = precio * cant;

        // Buscamos si el producto ya está en el carrito para sumar la cantidad
        let existe = carrito.find(item => item.nombre === nombre);
        if(existe) {
            existe.cant += cant;
            existe.subtotal += subtotal;
        } else {
            carrito.push({ nombre: nombre, cant: cant, subtotal: subtotal });
        }

        totalGeneral += subtotal;
        actualizarUI();
        document.getElementById(idQty).innerText = "1"; // Reset
        alert("¡" + nombre + " añadido!");
    }

    function actualizarUI() {
        document.getElementById('c-count').innerText = carrito.length;
        document.getElementById('c-total').innerText = totalGeneral.toLocaleString();
    }

    function enviarWhatsApp() {
        if(carrito.length === 0) return alert("¡El carrito está vacío!");

        // --- CONSTRUCCIÓN DEL MENSAJE DE WHATSAPP ---
        let mensaje = "🧾 *NUEVO PEDIDO*%0A";
        mensaje += "--------------------------%0A";

        // Recorremos el carrito CUALQUIERA que sea su contenido
        carrito.forEach(item => {
            mensaje += "✅ " + item.cant + " x " + item.nombre + " = *$" + item.subtotal.toLocaleString() + "*%0A";
        });

        mensaje += "--------------------------%0A";
        mensaje += "💰 *TOTAL A PAGAR: $" + totalGeneral.toLocaleString() + "*%0A%0A";
        mensaje += "_Por favor confirmar pedido._";

        const telefono = "573007918978";
        const url = "https://wa.me/" + telefono + "?text=" + mensaje;
        
        window.open(url, '_blank');
    }
</script>

</body>
</html>
